{% extends "base.html" %}
{% block content %}
<section class="section">
  <div class="container product-layout">
    <div class="product-image large" {% if product.image_path %}style="background-image:url('{{ product.image_path }}');"{% endif %}></div>
    <div class="panel">
      <div class="small">{{ product.category }}</div>
      <h1>{{ product.name }}</h1>
      <p>{{ product.description }}</p>
      <h2>${{ '%.2f'|format(product.price) }}</h2>
      <form method="post" action="{{ url_for('add_to_cart', product_id=product.id) }}">
        <label>Quantity</label>
        <input name="qty" type="number" value="1" min="1">
        <div style="margin-top:12px;">
          <button class="btn" type="submit">Add to Cart</button>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
