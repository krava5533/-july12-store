{% extends "base.html" %}
{% block content %}
<section class="section">
  <div class="container narrow">
    <div class="admin-top">
      <h1>Product Editor</h1>
      <a class="btn" href="{{ url_for('admin_products') }}">Back</a>
    </div>

    <div class="panel">
      <form method="post" enctype="multipart/form-data">
        <label>Name</label>
        <input name="name" value="{{ product.name if product else '' }}">
        <label>Price</label>
        <input name="price" type="number" step="0.01" value="{{ product.price if product else '' }}">
        <label>Category</label>
        <input name="category" value="{{ product.category if product else '' }}">
        <label>Description</label>
        <textarea name="description">{{ product.description if product else '' }}</textarea>
        <label>Sort order</label>
        <input name="sort_order" type="number" value="{{ product.sort_order if product else 0 }}">
        <label>Image URL</label>
        <input name="image_url" value="{{ product.image_path if product else '' }}">
        <input type="hidden" name="current_image" value="{{ product.image_path if product else '' }}">
        <label>Upload image</label>
        <input type="file" name="image_file" accept="image/*">
        <label><input type="checkbox" name="featured" {% if product and product.featured %}checked{% endif %}> Featured</label>
        <label><input type="checkbox" name="luxury" {% if product and product.luxury %}checked{% endif %}> Luxury</label>
        <label><input type="checkbox" name="active" {% if not product or product.active %}checked{% endif %}> Active</label>
        <div style="margin-top:16px;"><button class="btn" type="submit">Save Product</button></div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
