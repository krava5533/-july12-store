{% extends "base.html" %}
{% block content %}
<section class="section">
  <div class="container narrow">
    <div class="admin-top">
      <h1>Delivery + Uber</h1>
      <a class="btn" href="{{ url_for('admin_dashboard') }}">Dashboard</a>
    </div>
    <div class="panel">
      <form method="post">
        <label>Provider mode</label><input name="delivery_provider_mode" value="{{ settings.get('delivery_provider_mode','fixed') }}">
        <label>Zone 1 Name</label><input name="zone1_name" value="{{ settings.get('zone1_name','') }}">
        <label>Zone 1 Cities</label><input name="zone1_cities" value="{{ settings.get('zone1_cities','') }}">
        <label>Zone 1 Fee</label><input name="zone1_fee" value="{{ settings.get('zone1_fee','') }}">
        <label>Zone 2 Name</label><input name="zone2_name" value="{{ settings.get('zone2_name','') }}">
        <label>Zone 2 Cities</label><input name="zone2_cities" value="{{ settings.get('zone2_cities','') }}">
        <label>Zone 2 Fee</label><input name="zone2_fee" value="{{ settings.get('zone2_fee','') }}">
        <label>Zone 3 Name</label><input name="zone3_name" value="{{ settings.get('zone3_name','') }}">
        <label>Zone 3 Cities</label><input name="zone3_cities" value="{{ settings.get('zone3_cities','') }}">
        <label>Zone 3 Fee</label><input name="zone3_fee" value="{{ settings.get('zone3_fee','') }}">
        <label>Uber Enabled</label><input name="uber_enabled" value="{{ settings.get('uber_enabled','off') }}">
        <label>Uber Mode</label><input name="uber_mode" value="{{ settings.get('uber_mode','manual_quote') }}">
        <label>Uber Margin</label><input name="uber_margin" value="{{ settings.get('uber_margin','0') }}">
        <label>Uber Pickup Address</label><input name="uber_pickup_address" value="{{ settings.get('uber_pickup_address','') }}">
        <div style="margin-top:16px;"><button class="btn" type="submit">Save Delivery</button></div>
      </form>
      <p class="small">Real live Uber Direct dynamic pricing still requires valid Uber Direct credentials and production setup. This version is Uber-ready and currently supports admin-managed estimates.</p>
    </div>
  </div>
</section>
{% endblock %}
