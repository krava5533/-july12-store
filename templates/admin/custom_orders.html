{% extends "base.html" %}
{% block content %}
<section class="section">
  <div class="container">
    <div class="admin-top">
      <h1>Custom Orders</h1>
      <a class="btn" href="{{ url_for('admin_dashboard') }}">Dashboard</a>
    </div>
    <div class="panel">
      {% for order in orders %}
      <div class="summary-row">
        <div>
          <strong>{{ order.name }}</strong>
          <div class="small">{{ order.budget }} • {{ order.occasion }} • {{ order.phone }}</div>
        </div>
        <form method="post" action="{{ url_for('admin_custom_order_status', order_id=order.id) }}" class="row-inline">
          <select name="status">
            {% for s in ['New','In Review','Quoted','Accepted','Delivered'] %}
            <option value="{{ s }}" {% if order.status == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
          </select>
          <button class="btn" type="submit">Update</button>
        </form>
      </div>
      {% else %}
      <p>No custom orders yet.</p>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
